<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DevOps Monitoring Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Inter, Arial;
      background: #0b1220;
      color: #e5e7eb;
    }

    header {
      background: #111827;
      padding: 16px;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      border-bottom: 1px solid #1f2937;
    }

    /* 🚨 ALERT */
    #alertBox {
      display: none;
      background: #7f1d1d;
      color: white;
      padding: 12px;
      text-align: center;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      background: #1f2937;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .card h3 {
      margin-bottom: 10px;
      font-size: 16px;
      color: #9ca3af;
    }

    .value {
      font-size: 22px;
      font-weight: bold;
    }

    .status.up { color: #22c55e; }
    .status.down { color: #ef4444; }

    .charts {
      grid-column: span 3;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    canvas {
      background: #111827;
      padding: 10px;
      border-radius: 8px;
    }

    .controls {
      text-align: center;
      padding: 10px;
    }

    button {
      margin: 5px;
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }

    .refresh { background: #3b82f6; color: white; }
    .crash { background: #ef4444; color: white; }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>🚀 DevOps Monitoring Dashboard</header>

<!-- 🚨 ALERT BANNER -->
<div id="alertBox">
  ⚠️ Backend DOWN! Auto-recovery in progress...
</div>

<div class="container">

  <!-- STATUS -->
  <div class="card">
    <h3>Service Status</h3>
    <div id="status" class="value status">Checking...</div>
  </div>

  <!-- CPU -->
  <div class="card">
    <h3>CPU Usage</h3>
    <div id="cpu" class="value">--</div>
  </div>

  <!-- MEMORY -->
  <div class="card">
    <h3>Memory Usage</h3>
    <div id="memory" class="value">--</div>
  </div>

  <!-- CHARTS -->
  <div class="charts">
    <div class="card">
      <h3>CPU Trend</h3>
      <canvas id="cpuChart"></canvas>
    </div>

    <div class="card">
      <h3>Memory Trend</h3>
      <canvas id="memChart"></canvas>
    </div>
  </div>

</div>

<div class="controls">
  <button class="refresh" onclick="refreshAll()">Refresh</button>
  <button class="crash" onclick="crashBackend()">Crash Backend</button>
</div>

<div class="footer">
  Last updated: <span id="time">--</span>
</div>

<!-- 🔊 ALERT SOUND -->
<audio id="alertSound">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script>
let cpuData = [], memData = [], labels = [];
let isDown = false;

/* Charts */
const cpuChart = new Chart(document.getElementById('cpuChart'), {
  type: 'line',
  data: { labels, datasets: [{ data: cpuData, borderColor: '#22c55e', tension: 0.3 }] }
});

const memChart = new Chart(document.getElementById('memChart'), {
  type: 'line',
  data: { labels, datasets: [{ data: memData, borderColor: '#3b82f6', tension: 0.3 }] }
});

/* Metrics */
async function fetchMetrics() {
  const res = await fetch('/api/metrics');
  const text = await res.text();

  const cpuMatch = text.match(/^process_cpu_user_seconds_total\s+([0-9.]+)/m);
  const memMatch = text.match(/^process_resident_memory_bytes\s+([0-9.]+)/m);

  const cpu = cpuMatch ? parseFloat(cpuMatch[1]) : 0;
  const mem = memMatch ? parseFloat(memMatch[1]) / 1024 / 1024 : 0;

  document.getElementById("cpu").innerText = cpu.toFixed(3);
  document.getElementById("memory").innerText = mem.toFixed(2) + " MB";

  if (labels.length > 15) {
    labels.shift(); cpuData.shift(); memData.shift();
  }

  labels.push(new Date().toLocaleTimeString());
  cpuData.push(cpu);
  memData.push(mem);

  cpuChart.update();
  memChart.update();
}

/* Health + ALERT SYSTEM */
async function checkHealth() {
  try {
    await fetch('/api/health');

    document.getElementById("status").innerText = "UP";
    document.getElementById("status").className = "value status up";

    document.getElementById("alertBox").style.display = "none";
    isDown = false;

  } catch {
    document.getElementById("status").innerText = "DOWN";
    document.getElementById("status").className = "value status down";

    if (!isDown) {
      document.getElementById("alertBox").style.display = "block";
      document.getElementById("alertSound").play();
      isDown = true;
    }
  }
}

/* Actions */
function crashBackend() {
  fetch('/api/crash');
}

function updateTime() {
  document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
}

/* Main loop */
function refreshAll() {
  checkHealth();
  fetchMetrics();
  updateTime();
}

setInterval(refreshAll, 3000);
refreshAll();
</script>

</body>
</html>
